<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokéDesign Ranker Pro</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .toolbar { background: #2a2a2a; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; width: 100%; max-width: 500px; }
        select, input[type="text"] { background: #333; color: white; border: 1px solid #444; padding: 8px; border-radius: 5px; }
        .card { background: #1e1e1e; padding: 25px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.7); text-align: center; width: 380px; position: relative; border: 1px solid #333; }
        img { width: 260px; height: 260px; object-fit: contain; background: radial-gradient(#333, #1e1e1e); border-radius: 15px; margin-bottom: 15px; transition: transform 0.2s; }
        img:hover { transform: scale(1.05); }
        
        /* Type Bubble Styling */
        .type { 
            display: inline-block; 
            padding: 6px 14px; 
            border-radius: 20px; 
            margin: 3px; 
            font-weight: bold; 
            font-size: 0.75em; 
            text-transform: uppercase; 
            color: white; 
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            letter-spacing: 1px; 
            border: 1px solid rgba(255,255,255,0.1);
        }

        input[type="number"], textarea { width: 100%; padding: 12px; margin-top: 12px; border-radius: 8px; border: 1px solid #444; background: #2a2a2a; color: white; box-sizing: border-box; }
        .controls { margin-top: 25px; display: flex; justify-content: space-between; width: 100%; }
        button { cursor: pointer; padding: 12px 20px; border-radius: 8px; border: none; background: #e3350d; color: white; font-weight: bold; transition: 0.3s; }
        button:hover { background: #ff4500; filter: brightness(1.2); }
        .export-btn { background: #30a7d7; margin-top: 15px; width: 100%; }
        #counter { position: absolute; top: 15px; right: 20px; color: #666; font-size: 0.85em; }
    </style>
</head>
<body>

<div class="toolbar">
    <select id="genSelect" onchange="filterAndSort()">
        <option value="all">All Generations</option>
        <option value="1">Gen 1 (Kanto)</option>
        <option value="2">Gen 2 (Johto)</option>
        <option value="3">Gen 3 (Hoenn)</option>
        <option value="4">Gen 4 (Sinnoh)</option>
        <option value="5">Gen 5 (Unova)</option>
        <option value="6">Gen 6 (Kalos)</option>
        <option value="7">Gen 7 (Alola)</option>
        <option value="8">Gen 8 (Galar)</option>
        <option value="9">Gen 9 (Paldea)</option>
    </select>
    <select id="orderSelect" onchange="filterAndSort()">
        <option value="seq">In Order</option>
        <option value="rand">Randomized</option>
    </select>
    <input type="text" id="searchBar" placeholder="Search name..." oninput="filterAndSort()">
</div>

<div class="card">
    <div id="counter">0 / 0</div>
    <div id="poke-id" style="color: #555; font-weight: bold;">#---</div>
    <h2 id="poke-name" style="margin: 10px 0; text-transform: capitalize; font-size: 1.8em;">Loading...</h2>
    <img id="poke-img" src="" alt="Pokemon Art">
    <div id="poke-types"></div>
    
    <div class="info">
        <input type="number" id="score" min="1" max="100" placeholder="Score (1-100)">
        <textarea id="note" rows="3" placeholder="Design notes..."></textarea>
    </div>

    <div class="controls">
        <button onclick="prevPoke()">⬅ Back</button>
        <button onclick="saveData()" style="background:#444">Save</button>
        <button onclick="nextPoke()">Next ➡</button>
    </div>
    
    <button class="export-btn" onclick="exportCSV()">⬇ Export Rankings to CSV</button>
</div>

<script>
    let masterList = [];
    let activeList = [];
    let currentIndex = 0;
    let userRatings = JSON.parse(localStorage.getItem('pokeRatingsDB')) || {};

    const typeColors = {
        normal: '#A8A77A', fire: '#EE8130', water: '#6390F0', electric: '#F7D02C',
        grass: '#7AC74C', ice: '#96D9D6', fighting: '#C22E28', poison: '#A33EA1',
        ground: '#E2BF65', flying: '#A98FF3', psychic: '#F95587', bug: '#A6B91A',
        rock: '#B6A136', ghost: '#735797', dragon: '#6F35FC', steel: '#B7B7CE',
        fairy: '#D685AD', dark: '#705746'
    };

    const gens = {
        "1": [1, 151], "2": [152, 251], "3": [252, 386], "4": [387, 493], 
        "5": [494, 649], "6": [650, 721], "7": [722, 809], "8": [810, 905], "9": [906, 1025]
    };

    async function init() {
        try {
            const response = await fetch('https://pokeapi.co/api/v2/pokemon?limit=1500');
            const data = await response.json();
            masterList = data.results.map((p, index) => ({
                ...p,
                id: parseInt(p.url.split('/').filter(Boolean).pop())
            }));
            filterAndSort();
        } catch (e) { document.getElementById('poke-name').innerText = "Load Error!"; }
    }

    function filterAndSort() {
        saveData();
        const gen = document.getElementById('genSelect').value;
        const order = document.getElementById('orderSelect').value;
        const query = document.getElementById('searchBar').value.toLowerCase();

        activeList = masterList.filter(p => {
            const matchesSearch = p.name.includes(query);
            if (gen === "all") return matchesSearch;
            return p.id >= gens[gen][0] && p.id <= gens[gen][1] && matchesSearch;
        });

        if (order === "rand") {
            activeList.sort(() => Math.random() - 0.5);
        } else {
            activeList.sort((a, b) => a.id - b.id);
        }

        currentIndex = 0;
        updateDisplay();
    }

    async function updateDisplay() {
        if (activeList.length === 0) {
            document.getElementById('poke-name').innerText = "No results";
            return;
        }
        
        const current = activeList[currentIndex];
        document.getElementById('counter').innerText = `${currentIndex + 1} / ${activeList.length}`;
        
        const res = await fetch(current.url);
        const details = await res.json();

        document.getElementById('poke-name').innerText = details.name.replace(/-/g, ' ');
        document.getElementById('poke-id').innerText = `#${details.id}`;
        document.getElementById('poke-img').src = details.sprites.other['official-artwork'].front_default || details.sprites.front_default;
        
        // Apply color coding here
        document.getElementById('poke-types').innerHTML = details.types.map(t => {
            const color = typeColors[t.type.name] || '#777';
            return `<span class="type" style="background-color: ${color}">${t.type.name}</span>`;
        }).join('');

        const saved = userRatings[details.name] || { score: '', note: '' };
        document.getElementById('score').value = saved.score;
        document.getElementById('note').value = saved.note;
    }

    function saveData() {
        if (activeList.length === 0) return;
        const name = activeList[currentIndex].name;
        userRatings[name] = {
            score: document.getElementById('score').value,
            note: document.getElementById('note').value
        };
        localStorage.setItem('pokeRatingsDB', JSON.stringify(userRatings));
    }

    function nextPoke() { saveData(); if(currentIndex < activeList.length - 1) { currentIndex++; updateDisplay(); } }
    function prevPoke() { saveData(); if(currentIndex > 0) { currentIndex--; updateDisplay(); } }

    function exportCSV() {
        saveData();
        let csv = "Name,Score,Note\n";
        Object.entries(userRatings).forEach(([n, d]) => {
            if(d.score) csv += `${n},${d.score},"${d.note.replace(/"/g, '""')}"\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.setAttribute('href', url);
        a.setAttribute('download', 'pokerankings.csv');
        a.click();
    }

    window.addEventListener('keydown', (e) => {
        if (["INPUT", "TEXTAREA"].includes(document.activeElement.tagName)) return;
        if (e.key === "ArrowRight") nextPoke();
        if (e.key === "ArrowLeft") prevPoke();
        if (e.key === "Enter") document.getElementById('score').focus();
    });

    init();
</script>
</body>
</html>
